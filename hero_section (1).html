<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ricardo Gouvêa Jr – Odontologia</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gray-dark: #3a3d42;
      --white:     #f5f5f3;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      background: #787c84;
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: clamp(2rem, 5vw, 5rem);
      padding: 1.4rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }
    nav a {
      font-family: 'Poppins', sans-serif;
      font-size: 0.83rem;
      font-weight: 400;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.02em;
      opacity: 0.9;
      transition: opacity .2s;
      position: relative;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--white);
      transition: width .3s ease;
    }
    nav a:first-child::after { width: 100%; }
    nav a:hover { opacity: 1; }
    nav a:hover::after { width: 100%; }

    /* ── HERO (DESKTOP) ── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      overflow: hidden;
    }

    /* Background image — desktop: covers full hero */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* Gradient overlay for text readability */
    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to right,
        rgba(60,63,68,0.58) 0%,
        rgba(60,63,68,0.32) 45%,
        rgba(60,63,68,0.0) 75%
      );
    }

    /* ── LEFT CONTENT ── */
    .content {
      position: relative;
      z-index: 5;
      padding: clamp(5rem, 10vw, 9rem) clamp(2rem, 6vw, 6rem) 4rem;
      animation: fadeUp .9s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fadeUp .7s .15s ease forwards;
    }
    .logo img {
      height: 38px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2.4rem, 5.5vw, 4.4rem);
      font-weight: 300;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp .8s .3s ease forwards;
    }
    h1 strong { font-weight: 700; }

    .sub {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      line-height: 1.65;
      max-width: 340px;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp .8s .45s ease forwards;
    }

    .cta {
      display: inline-block;
      padding: 1rem 2.2rem;
      background: rgba(255,255,255,0.92);
      color: var(--gray-dark);
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.6);
      transition: background .25s, color .25s, transform .2s;
      opacity: 0;
      animation: fadeUp .8s .6s ease forwards;
    }
    .cta:hover {
      background: var(--gray-dark);
      color: var(--white);
      transform: translateY(-2px);
    }

    /* desktop right spacer */
    .spacer { position: relative; z-index: 2; }

    /* ── MOBILE ── */

      /* stack vertically: photo on top, content below */
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: 100svh;
        align-items: start;
        background: #6e7177;
      }

      /* hide the full-bleed bg and overlay on mobile */
      .hero-bg,
      .hero-overlay { display: none; }

      /* spacer becomes the photo panel at the top */

        width: 100%;
